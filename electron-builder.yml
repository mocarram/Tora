appId: com.tora.clipboard
productName: Tora
copyright: Copyright (c) 2026 Tora

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

# Tray icons must ship inside the app (loaded from process.resourcesPath at
# runtime). The @2x variant is auto-selected on retina.
extraResources:
  - from: build/trayTemplate.png
    to: trayTemplate.png
  - from: build/trayTemplate@2x.png
    to: trayTemplate@2x.png
  # Per-accent Dock icons, swapped at runtime to match the chosen accent vibe.
  # Source dir is build/accent-icons (NOT build/icons, which electron-builder
  # reserves as an icon-set directory); shipped to resources as icons/.
  - from: build/accent-icons
    to: icons
    filter: ['*.png']

asarUnpack:
  # Native module must stay unpacked so its .node binary can be loaded.
  - '**/node_modules/better-sqlite3/**'

# Rebuild native deps against the Electron ABI at package time.
npmRebuild: true

# In-app updates (electron-updater) read releases from this public GitHub repo.
# Publishing happens only with `electron-builder --publish`; a plain build never
# uploads anything.
publish:
  provider: github
  owner: mocarram
  repo: Tora

mac:
  category: public.app-category.productivity
  target:
    # dmg for first-time manual download; zip is what electron-updater actually
    # applies (Squirrel.Mac) and what produces latest-mac.yml.
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing identity + notarization credentials are supplied via environment
  # variables at release time, never committed. See RELEASE.md / GAPS.md:
  #   CSC_LINK, CSC_KEY_PASSWORD (Developer ID Application cert)
  #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID (notarization)
  notarize: false

dmg:
  title: ${productName}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
