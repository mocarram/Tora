name: Security

on:
  push:
    branches: [main, staging]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Hard gate: fail the build on a known high/critical advisory in a dependency
  # that SHIPS to users (production deps). Build-time-only devDependencies
  # (vite/esbuild/electron-vite and friends) never reach the packaged app, so a
  # dev-server-only advisory there must not block a release - it is surfaced by
  # the advisory step below instead. Scope the gate to what users actually run.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest
      - name: npm audit production deps (fail on high or critical)
        run: npm audit --omit=dev --audit-level=high
      - name: npm audit full tree (advisory, includes dev tooling)
        if: always()
        run: |
          {
            echo '### npm audit - full tree (advisory)'
            echo ''
            echo 'Includes build-time devDependencies, which do not ship. Review'
            echo 'but does not gate the build.'
            echo ''
            echo '```'
            npm audit 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # PR-only gate: block a pull request that introduces a vulnerable or
  # disallowed-license dependency. Needs the base ref, so it only runs on PRs.
  # The Dependency Review API is only available on public repositories (or
  # private repos with GitHub Advanced Security), so this is skipped while the
  # repo is private and self-activates once it goes public. npm audit above is
  # the vulnerability gate in the meantime.
  dependency-review:
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # Advisory: Electron-specific static analysis (insecure webPreferences, CSP,
  # missing permission handlers, etc.). Reported as an artifact + job summary
  # rather than a hard gate, because it is prone to false positives on an
  # already-hardened app. Review new findings when the report changes.
  electronegativity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Electronegativity
        run: npx --yes @doyensec/electronegativity@latest -i src -o electronegativity.csv
      - name: Summarise findings
        if: always()
        run: |
          {
            echo '### Electronegativity (advisory)'
            echo ''
            if [ -f electronegativity.csv ]; then
              echo '```'
              cat electronegativity.csv
              echo '```'
            else
              echo 'No report produced.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electronegativity-report
          path: electronegativity.csv
          if-no-files-found: ignore
