name: E2E

# Drives the REAL built Electron app through Playwright's _electron support
# (capture, navigation, card actions, boards, window/settings, security,
# stability, performance). These need a windowserver and the native module
# rebuilt for Electron's ABI, so they run on a macOS runner - not the ubuntu
# unit-test job. Scoped to PRs into the protected branches plus manual dispatch
# to keep macOS minutes (≈10x ubuntu) in check rather than running on every push.

on:
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-mac:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci

      # Build the app the tests launch (out/main/index.js).
      - name: Build
        run: npm run build

      # better-sqlite3 ships built for the Node ABI; the e2e suite launches the
      # app under Electron, so its native module must be rebuilt for the Electron
      # ABI or the app fails to open the database. See tests/e2e/helpers.ts.
      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Run E2E
        run: npm run test:e2e

      # On failure the HTML report + traces (trace: on-first-retry) make the
      # flake/regression diagnosable without re-running locally.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
